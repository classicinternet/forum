name: Sitemap
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -s https://classicforum.indiachan.workers.dev/sitemap.xml > sitemap.xml
      - run: |
          git config user.email "bot@github.com"
          git config user.name "SitemapBot"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git add sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update sitemap" && git push
