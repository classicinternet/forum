name: Sitemap
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl -s https://classicforum.indiachan.workers.dev/sitemap.xml > forum/sitemap.xml
      - run: |
          git config user.email "bot@github.com"
          git config user.name "SitemapBot"
          git add forum/sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update sitemap" && git push
