<script>
const WORKER_URL = 'https://indiachan.indiachan.workers.dev/'; 

let isVerified = false;
let captchaToken = null; // ✅ FIX
let frame = null;

// ✅ FIX: Capture token
function onCaptchaSuccess(token) {
    captchaToken = token;
    isVerified = true;

    const btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.classList.remove('opacity-50', 'cursor-not-allowed');
}

function acceptAge() { 
    localStorage.setItem('v3_age', 't'); 
    document.getElementById('ageWall').remove(); 
}
if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

async function handleFileUpload(input) {
    const file = input.files[0];
    if (!file) return;

    const status = document.getElementById('uploadStatus');
    status.innerText = "Uploading...";
    status.classList.remove('hidden');

    try {
        const config = await api("?config=true");
        const formData = new FormData();
        formData.append("image", file);

        const res = await fetch(`https://api.imgbb.com/1/upload?key=${config.imgbb}`, { 
            method: "POST", 
            body: formData 
        });

        const data = await res.json();

        if (data.success) {
            document.getElementById('inpImageLink').value = data.data.url;
            status.innerText = "Upload Success!";
            setTimeout(() => status.classList.add('hidden'), 2000);
        }
    } catch (e) { 
        status.classList.add('hidden'); 
    }
}

function toggleExpand(el) { 
    el.classList.toggle('expanded'); 
}

// ✅ FIX: Better error handling
async function api(path = "", method = "GET", body = null, headers = {}) {
    const sep = path.includes('?') ? '&' : '?';
    const url = `${WORKER_URL}${path}${sep}t=${Date.now()}`;

    const options = { 
        method, 
        headers: { ...headers } 
    };

    if (body) {
        options.headers['Content-Type'] = 'application/json';
        options.body = JSON.stringify(body);
    }

    let res;
    try {
        res = await fetch(url, options);
    } catch (e) {
        console.error("Fetch failed:", e);
        return null;
    }

    if (!res.ok) {
        console.error("API error:", res.status, await res.text());
        return null;
    }

    return await res.json();
}

async function submitPost() {
    if (!isVerified || !captchaToken) return;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "TRANSMITTING...";

    const h = window.location.hash; 
    const isReply = h.startsWith('#thread/');

    const res = await api("", "POST", {
        token: captchaToken, // ✅ FIX
        type: isReply ? 'reply' : 'thread',
        threadId: isReply ? h.split('/')[1] : null,
        title: document.getElementById('inpTitle').value || "Anonymous",
        content: document.getElementById('inpContent').value,
        image: document.getElementById('inpImageLink').value
    });

    if(res) { 
        document.getElementById('inpTitle').value = "";
        document.getElementById('inpContent').value = "";
        document.getElementById('inpImageLink').value = "";

        captchaToken = null; // ✅ RESET
        isVerified = false;

        closeModal();
        btn.disabled = false;
        btn.innerText = "Transmit Message";

        await router();
    } else {
        btn.disabled = false;
        btn.innerText = "Transmit Message";
        alert("Submission failed.");
    }
}

function openModal() { 
    document.getElementById('postModal').classList.remove('hidden'); 
    if (typeof turnstile !== "undefined") turnstile.reset(); 
}

function closeModal() { 
    document.getElementById('postModal').classList.add('hidden'); 
}
</script>
