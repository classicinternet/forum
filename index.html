<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassicInternetForum</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-hover:hover { background: rgba(40, 40, 40, 1); border-color: rgba(255, 255, 255, 0.3); transform: translateY(-3px); transition: 0.3s; }
        .greentext { color: #3b82f6 !important; }
        .post-img { max-width: 250px; max-height: 250px; border-radius: 12px; margin-top: 12px; cursor: zoom-in; border: 1px solid rgba(255,255,255,0.1); }
        .post-img.expanded { max-width: 100%; max-height: none; cursor: zoom-out; }
        input, textarea { background: #1a1a1a !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        input:focus { border-color: #fff !important; }
    </style>
</head>
<body class="pb-24">

    <div id="ageWall" class="fixed inset-0 bg-black z-[2000] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm">
            <h2 class="text-white font-black text-2xl tracking-tighter mb-6">ClassicInternet.github.io/FORUM</h2>
            <button onclick="acceptAge()" class="bg-white text-black w-full py-5 rounded-2xl font-black tracking-widest hover:scale-105 transition-all">I AM 18+ / ENTER</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-12 flex flex-col sm:flex-row justify-between items-center gap-6">
            <div onclick="window.location.hash = ''" class="cursor-pointer text-center sm:text-left">
                <h1 class="text-white font-black text-xl tracking-tighter">ClassicInternet.github.io/FORUM</h1>
                <span class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">Archive of the Open Web</span>
            </div>
            <button onclick="openModal()" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] tracking-widest uppercase shadow-2xl">New Thread</button>
        </header>

        <div id="view-container" class="space-y-6"></div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[1000] flex items-center justify-center backdrop-blur-md p-4">
        <div class="glass w-full max-w-lg p-6 sm:p-10 rounded-[2.5rem] shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex justify-between items-center mb-8">
                <span class="text-[11px] font-black text-white uppercase tracking-widest">New Transmission</span>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input id="inpTitle" type="text" placeholder="Subject (Optional)" class="w-full p-4 rounded-xl mb-4 text-sm font-bold">
            <textarea id="inpContent" placeholder="Enter anonymous content... (> for blue text)" class="w-full p-4 rounded-xl mb-5 h-40 text-sm leading-relaxed"></textarea>
            <input id="inpImageLink" type="url" placeholder="Image URL (Optional)" class="w-full p-4 rounded-xl mb-6 text-xs font-bold">
            
            <div class="flex justify-center mb-8">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_1Q9M2a470-hnw" data-callback="onCaptchaSuccess"></div>
            </div>

            <button id="submitBtn" onclick="submitPost()" class="bg-white text-black w-full py-5 rounded-2xl font-black uppercase tracking-widest opacity-50 cursor-not-allowed" disabled>Transmit Message</button>
        </div>
    </div>

    <script>
        // REPLACE WITH YOUR ACTUAL WORKER URL
        const WORKER_URL = 'https://indiachan.indiachan.workers.dev'; 
        let captchaToken = null;

        function onCaptchaSuccess(token) {
            captchaToken = token;
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function acceptAge() { localStorage.setItem('v3_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

        async function api(path = "", method = "GET", body = null, headers = {}) {
            try {
                const url = `${WORKER_URL}${path}${path.includes('?') ? '&' : '?'}t=${Date.now()}`;
                const options = { method, headers: { ...headers } };
                if (body) { 
                    options.headers['Content-Type'] = 'application/json'; 
                    options.body = JSON.stringify(body); 
                }
                const res = await fetch(url, options);
                return await res.json();
            } catch (e) {
                console.error("API Failure:", e);
                return null;
            }
        }

        async function router() {
            const h = window.location.hash;
            const container = document.getElementById('view-container');
            container.innerHTML = `<p class="text-center text-slate-500 animate-pulse uppercase font-black text-[10px] tracking-widest">Accessing Archive...</p>`;
            
            if (h.startsWith('#thread/')) {
                const threadId = h.split('/')[1];
                const data = await api(`?id=${threadId}`);
                if (!data || data.error) {
                    container.innerHTML = `<p class="text-center">Thread Not Found.</p>`;
                    return;
                }
                renderThread(data);
            } else {
                const data = await api();
                renderBoard(data || []);
            }
        }

        function renderBoard(threads) {
            const container = document.getElementById('view-container');
            container.innerHTML = threads.map((t, i) => `
                <div onclick="window.location.hash = '#thread/${t.id}'" class="relative glass glass-hover p-5 rounded-[2rem] flex gap-5 items-center cursor-pointer">
                    <div class="w-16 h-16 bg-white/5 rounded-xl flex-shrink-0 flex items-center justify-center overflow-hidden border border-white/10">
                        ${t.replies?.[0]?.image ? `<img src="${t.replies[0].image}" class="w-full h-full object-cover opacity-80">` : `<span class="text-[10px] font-black text-slate-700">TXT</span>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h2 class="text-sm font-black text-white uppercase truncate">${t.title || 'Anonymous'}</h2>
                        <p class="text-slate-500 text-[11px] line-clamp-1 opacity-70">${t.replies?.[0]?.content || ''}</p>
                    </div>
                    <div class="text-[10px] font-black text-slate-700">#${i+1}</div>
                </div>
            `).join('');
        }

        function renderThread(t) {
            const container = document.getElementById('view-container');
            container.innerHTML = `
                <button onclick="window.location.hash = ''" class="mb-8 text-[10px] font-black uppercase text-slate-500 hover:text-white">← Back to Board</button>
                <h1 class="text-xl font-black text-white mb-8 uppercase tracking-tighter">${t.title}</h1>
                <div class="space-y-4">
                    ${t.replies.map(r => `
                        <div class="glass p-6 rounded-[2rem]">
                            <div class="flex justify-between text-[10px] font-black text-slate-600 uppercase mb-4">
                                <span>ID: ${r.userId}</span>
                                <span>${r.time}</span>
                            </div>
                            <div class="text-sm text-slate-200 whitespace-pre-wrap leading-relaxed">${formatContent(r.content)}</div>
                            ${r.image ? `<img src="${r.image}" class="post-img" onclick="this.classList.toggle('expanded')">` : ''}
                        </div>
                    `).join('')}
                </div>
                ${!t.locked ? `<div class="mt-12"><button onclick="openModal()" class="w-full bg-white text-black py-4 rounded-2xl font-black uppercase tracking-widest">Post Reply</button></div>` : ''}
            `;
        }

        function formatContent(text) {
            return text.split('\n').map(line => {
                if (line.startsWith('>') && !line.startsWith('>>')) return `<span class="greentext">${line}</span>`;
                return line;
            }).join('\n');
        }

        async function submitPost() {
            if (!captchaToken) return;
            const btn = document.getElementById('submitBtn');
            btn.innerText = "TRANSMITTING...";
            btn.disabled = true;

            const h = window.location.hash;
            const isReply = h.startsWith('#thread/');
            
            const res = await api("", "POST", {
                type: isReply ? 'reply' : 'thread',
                threadId: isReply ? h.split('/')[1] : null,
                title: document.getElementById('inpTitle').value,
                content: document.getElementById('inpContent').value,
                image: document.getElementById('inpImageLink').value,
                token: captchaToken
            });

            if (res && res.success) {
                closeModal();
                location.reload();
            } else {
                alert("Transmission Failed: " + (res?.error || "Check Connection"));
                btn.innerText = "Transmit Message";
                btn.disabled = false;
            }
        }

        function openModal() { document.getElementById('postModal').classList.remove('hidden'); if(typeof turnstile !== "undefined") turnstile.reset(); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        window.onhashchange = router;
        router();
    </script>
</body>
</html>
