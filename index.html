<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassicInternetForum | Archive of the Open Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000000; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-hover:hover { background: rgba(40, 40, 40, 1); border-color: rgba(255, 255, 255, 0.3); transform: translateY(-3px); transition: all 0.3s ease; }
        .thread-number { position: absolute; top: -10px; left: 20px; background: #333333; color: white; font-size: 11px; font-weight: 900; padding: 4px 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); z-index: 10; }
        .post-img { max-width: 200px; max-height: 200px; border-radius: 12px; margin-top: 12px; border: 1px solid rgba(255,255,255,0.1); cursor: zoom-in; }
        .post-img.expanded { max-width: 100%; max-height: none; cursor: zoom-out; }
        .thumb-box { width: 85px; height: 85px; min-width: 85px; border-radius: 12px; overflow: hidden; background: #1a1a1a; border: 1px solid rgba(255,255,255,0.1); }
        .greentext { color: #3b82f6 !important; }
        .admin-menu { z-index: 999 !important; }
        input, textarea { background: #1a1a1a !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body class="pb-32">

    <div id="ageWall" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm w-full">
            <h2 class="text-white font-black text-2xl tracking-tighter mb-2">ClassicInternet.github.io/FORUM</h2>
            <button onclick="acceptAge()" class="bg-white text-black w-full py-5 rounded-2xl font-black tracking-widest hover:scale-105 transition-all">I AM 18+ / ENTER</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-12 flex flex-col sm:flex-row justify-between items-center gap-6">
            <div onclick="window.location.hash = ''" class="cursor-pointer">
                <h1 class="text-white font-black text-xl tracking-tighter">ClassicInternet.github.io/FORUM</h1>
                <span class="text-[9px] text-slate-500 font-bold uppercase tracking-[0.2em]">Archive of the Open Web</span>
            </div>
            <button onclick="openModal()" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] tracking-widest uppercase">New Thread</button>
        </header>

        <div id="view-container" class="space-y-6"></div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[1000] flex items-end sm:items-center justify-center backdrop-blur-md p-4">
        <div class="glass w-full max-w-lg p-6 sm:p-10 rounded-[2rem] max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <span id="modalTitle" class="text-[11px] font-black text-white uppercase tracking-widest">New Transmission</span>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-full bg-white/5"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input id="inpTitle" type="text" placeholder="Subject (Optional)" class="w-full p-4 rounded-xl mb-4 text-sm">
            <textarea id="inpContent" placeholder="Content... (Lines starting with > will turn blue)" class="w-full p-4 rounded-xl mb-5 h-40 text-sm"></textarea>
            
            <div class="mb-6">
                <input id="inpImageLink" type="url" placeholder="Paste Image/Video URL..." class="w-full p-4 rounded-xl text-xs mb-2">
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFileUpload(this)">
                <button onclick="document.getElementById('fileInput').click()" class="text-[10px] text-slate-400 font-bold uppercase underline">Or Upload Image (ImgBB)</button>
            </div>

            <div class="flex justify-center mb-6">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_1Q9M2a470-hnw" data-callback="onCaptchaSuccess"></div>
            </div>

            <button id="submitBtn" onclick="submitPost()" class="bg-white text-black w-full py-4 rounded-xl font-black uppercase tracking-widest opacity-50 cursor-not-allowed" disabled>Transmit</button>
        </div>
    </div>

    <script>
        // CHANGE THIS TO YOUR CLOUDFLARE WORKER URL (e.g., https://your-worker.yourname.workers.dev/)
        const WORKER_URL = 'https://indiachan.indiachan.workers.dev'; 
        let isVerified = false;

        function onCaptchaSuccess() {
            isVerified = true;
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function acceptAge() { localStorage.setItem('v3_age', 't'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('v3_age')) document.getElementById('ageWall').remove();

        async function api(path = "", method = "GET", body = null, headers = {}) {
            try {
                const url = `${WORKER_URL}${path}${path.includes('?') ? '&' : '?'}t=${Date.now()}`;
                const options = { method, headers: { ...headers } };
                if (body) { 
                    options.headers['Content-Type'] = 'application/json'; 
                    options.body = JSON.stringify(body); 
                }
                const res = await fetch(url, options);
                if (!res.ok) throw new Error('Network response was not ok');
                return await res.json();
            } catch (e) {
                console.error("API Error:", e);
                return null;
            }
        }

        function renderBoard(threads, filterArchive = false) {
            const container = document.getElementById('view-container');
            const filtered = threads.filter(t => filterArchive ? t.locked : !t.locked);
            
            container.innerHTML = filtered.map((t, i) => `
                <div onclick="window.location.hash = '#thread/${t.id}'" class="relative glass glass-hover p-5 rounded-[2rem] flex gap-5 items-center cursor-pointer">
                    <div class="thread-number">#${i + 1}</div>
                    <div class="thumb-box">${t.image ? `<img src="${t.image}" class="w-full h-full object-cover">` : '<div class="flex items-center justify-center h-full text-[10px] text-slate-600">TXT</div>'}</div>
                    <div class="flex-1 min-w-0">
                        <h2 class="text-sm font-black text-white uppercase truncate">${t.title || 'Anonymous'}</h2>
                        <p class="text-slate-500 text-[11px] line-clamp-1">${t.replies?.[0]?.content || 'No content'}</p>
                    </div>
                </div>
            `).join('');
        }

        async function submitPost() {
            if (!isVerified) return;
            const token = turnstile.getResponse();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "SENDING...";
            btn.disabled = true;

            const h = window.location.hash;
            const isReply = h.startsWith('#thread/');

            const payload = {
                type: isReply ? 'reply' : 'thread',
                threadId: isReply ? h.split('/')[1] : null,
                title: document.getElementById('inpTitle').value,
                content: document.getElementById('inpContent').value,
                image: document.getElementById('inpImageLink').value,
                token: token
            };

            const res = await api("", "POST", payload);
            if (res) {
                closeModal();
                location.reload(); 
            } else {
                alert("Failed. Check Worker/Captcha.");
                btn.disabled = false;
                btn.innerText = "Transmit";
            }
        }

        async function router() {
            const h = window.location.hash;
            const container = document.getElementById('view-container');
            container.innerHTML = '<p class="text-center text-slate-500 animate-pulse uppercase font-black text-xs">Accessing Database...</p>';
            
            if (h.startsWith('#thread/')) {
                const data = await api(`?id=${h.split('/')[1]}`);
                if(data) {
                    container.innerHTML = `<button onclick="window.location.hash=''" class="text-[10px] font-black text-slate-500 mb-4 uppercase">← Back</button>` + 
                    data.replies.map(r => `<div class="glass p-6 rounded-[2rem] mb-4">
                        <div class="text-[10px] text-slate-500 mb-2">ID: ${r.userId}</div>
                        <div class="text-sm whitespace-pre-wrap">${r.content}</div>
                        ${r.image ? `<img src="${r.image}" class="post-img mt-4" onclick="this.classList.toggle('expanded')">` : ''}
                    </div>`).join('');
                }
            } else {
                const data = await api();
                renderBoard(data || []);
            }
        }

        function openModal() { document.getElementById('postModal').classList.remove('hidden'); turnstile.reset(); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        window.onhashchange = router;
        router();
    </script>
</body>
</html>
