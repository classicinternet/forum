<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ClassicInternetForum | Archive of the Open Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .glass { background: rgba(26, 26, 26, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .greentext { color: #3b82f6 !important; }
        .post-img { max-width: 250px; max-height: 250px; border-radius: 12px; margin-top: 12px; cursor: zoom-in; }
        .post-img.expanded { max-width: 100%; max-height: none; cursor: zoom-out; }
    </style>
</head>
<body class="pb-24">
    <div id="ageWall" class="fixed inset-0 bg-black z-[2000] flex items-center justify-center p-6 text-center">
        <div class="max-w-sm">
            <h2 class="text-white font-black text-2xl tracking-tighter mb-6">ClassicInternet.github.io/FORUM</h2>
            <button onclick="acceptAge()" class="bg-white text-black w-full py-5 rounded-2xl font-black tracking-widest uppercase hover:scale-105 transition-all">Enter 18+</button>
        </div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <header class="py-12 flex justify-between items-center">
            <div onclick="window.location.hash = ''" class="cursor-pointer">
                <h1 class="text-white font-black text-xl tracking-tighter">ClassicInternet</h1>
                <span class="text-[9px] text-slate-500 font-bold uppercase tracking-widest">Forum Archive</span>
            </div>
            <button onclick="openModal()" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] tracking-widest uppercase shadow-2xl">New Post</button>
        </header>
        <div id="view-container" class="space-y-6"></div>
    </div>

    <div id="postModal" class="hidden fixed inset-0 bg-black/90 z-[1000] flex items-center justify-center backdrop-blur-md p-4">
        <div class="glass w-full max-w-lg p-10 rounded-[2.5rem] shadow-2xl">
            <input id="inpTitle" type="text" placeholder="Subject (Optional)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 text-sm font-bold text-white outline-none">
            <textarea id="inpContent" placeholder="Anonymous content..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-5 h-40 text-sm leading-relaxed text-white outline-none"></textarea>
            <input id="inpImageLink" type="url" placeholder="Image URL (Optional)" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 text-xs font-bold text-white outline-none">
            
            <div class="flex justify-center mb-6">
                <div class="cf-turnstile" data-sitekey="0x4AAAAAAC_1Q9M2a470-hnw" data-callback="onCaptcha"></div>
            </div>

            <button id="submitBtn" onclick="submitPost()" class="bg-white text-black w-full py-5 rounded-2xl font-black uppercase tracking-widest opacity-50 cursor-not-allowed" disabled>Transmit</button>
            <button onclick="closeModal()" class="w-full mt-4 text-[10px] text-slate-500 font-bold uppercase">Cancel</button>
        </div>
    </div>

    <script>
        const WORKER_URL = 'https://indiachan.indiachan.workers.dev'; 
        let captchaToken = null;

        function onCaptcha(token) {
            captchaToken = token;
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'cursor-not-allowed');
        }

        function acceptAge() { localStorage.setItem('age_gate', 'ok'); document.getElementById('ageWall').remove(); }
        if(localStorage.getItem('age_gate')) document.getElementById('ageWall').remove();

        async function api(path = "", method = "GET", body = null, headers = {}) {
            const url = `${WORKER_URL}${path}${path.includes('?') ? '&' : '?'}t=${Date.now()}`;
            const opts = { method, headers: { ...headers } };
            if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
            try {
                const res = await fetch(url, opts);
                return await res.json();
            } catch (e) {
                console.error("API Error", e);
                return null;
            }
        }

        async function router() {
            const h = window.location.hash;
            const container = document.getElementById('view-container');
            container.innerHTML = `<p class="text-center text-slate-500 animate-pulse text-[10px] font-black uppercase tracking-widest">Accessing Board...</p>`;
            
            if (h.startsWith('#thread/')) {
                const id = h.split('/')[1];
                const data = await api(`?id=${id}`);
                if (!data || data.error) { container.innerHTML = "Not Found."; return; }
                renderThread(data);
            } else {
                const data = await api();
                renderBoard(data || []);
            }
        }

        function renderBoard(threads) {
            const container = document.getElementById('view-container');
            container.innerHTML = threads.map(t => `
                <div onclick="window.location.hash = '#thread/${t.id}'" class="glass p-5 rounded-3xl cursor-pointer hover:scale-[1.01] transition-transform">
                    <h2 class="text-sm font-black text-white uppercase truncate">${t.title}</h2>
                    <p class="text-slate-500 text-[11px] mt-1">${t.replies.length} replies • Last activity: ${t.replies[t.replies.length-1].time}</p>
                </div>
            `).join('');
        }

        function renderThread(t) {
            const container = document.getElementById('view-container');
            container.innerHTML = `<button onclick="location.hash=''" class="text-[10px] font-black text-slate-500 mb-8 uppercase">← Back</button>
                <h1 class="text-xl font-black mb-8 uppercase tracking-tighter">${t.title}</h1>
                <div class="space-y-4">` + 
                t.replies.map(r => `
                    <div class="glass p-6 rounded-[2rem]">
                        <div class="flex justify-between text-[9px] font-black text-slate-600 mb-3 uppercase">
                            <span>ID: ${r.userId}</span><span>${r.time}</span>
                        </div>
                        <div class="text-sm text-slate-300 whitespace-pre-wrap">${formatText(r.content)}</div>
                        ${r.image ? `<img src="${r.image}" class="post-img" onclick="this.classList.toggle('expanded')">` : ''}
                    </div>
                `).join('') + `</div>`;
        }

        function formatText(t) {
            return t.split('\n').map(l => l.startsWith('>') && !l.startsWith('>>') ? `<span class="greentext">${l}</span>` : l).join('\n');
        }

        async function submitPost() {
            const h = window.location.hash;
            const isReply = h.startsWith('#thread/');
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Transmitting...";
            btn.disabled = true;

            const res = await api("", "POST", {
                type: isReply ? 'reply' : 'thread',
                threadId: isReply ? h.split('/')[1] : null,
                title: document.getElementById('inpTitle').value,
                content: document.getElementById('inpContent').value,
                image: document.getElementById('inpImageLink').value,
                token: captchaToken
            });

            if (res && res.success) { closeModal(); location.reload(); }
            else { alert(res?.error || "Error"); btn.innerText = "Transmit"; btn.disabled = false; }
        }

        function openModal() { document.getElementById('postModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('postModal').classList.add('hidden'); }

        window.onhashchange = router;
        router();
    </script>
</body>
</html>
